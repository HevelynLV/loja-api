name: CI

on:
  push:
    branches:
      - develop
      - "feature/**"

  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Start Front-End Server
        run: |
          npm install -g http-server
          http-server . -p 3001 &
          sleep 5

      - name: Run Jest tests
        run: npm test
